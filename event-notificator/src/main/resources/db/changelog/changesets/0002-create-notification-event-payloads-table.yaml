databaseChangeLog:
  - changeSet:
      id: 0002-create-notification-event-payloads-table
      author: Andruschka77
      changes:
        - createTable:
            tableName: notification_event_payloads
            columns:
              - column:
                  name: payload_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: event_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: event_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: occurred_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: changed_by_id
                  type: BIGINT
              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false