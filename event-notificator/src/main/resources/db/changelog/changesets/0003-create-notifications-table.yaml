databaseChangeLog:
  - changeSet:
      id: 0003-create-notifications-table
      author: Andruschka77
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: notification_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: payload_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: is_read
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: read_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: notifications
            baseColumnNames: payload_id
            referencedTableName: notification_event_payloads
            referencedColumnNames: payload_id
            constraintName: fk_notifications_payload